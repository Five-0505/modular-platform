<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专科一体化管理平台</title>
  <style>/* ===================================================================
   专科一体化管理平台 - 模块化设计系统 CSS
   所有原始样式 + 模块化扩展样式
   =================================================================== */

/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#3B82F6;--primary-light:#60A5FA;--primary-dark:#2563EB;--primary-bg:#EFF6FF;
  --success:#10B981;--success-bg:#ECFDF5;--warning:#F59E0B;--warning-bg:#FFFBEB;
  --danger:#EF4444;--danger-bg:#FEF2F2;--info:#6366F1;--info-bg:#EEF2FF;
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;
  --gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;--gray-900:#111827;
  --radius:8px;--radius-lg:12px;--radius-sm:6px;
  --shadow:0 2px 8px rgba(0,0,0,0.08);--shadow-lg:0 4px 16px rgba(0,0,0,0.12);--shadow-sm:0 1px 4px rgba(0,0,0,0.05);
  --sidebar-width:280px;--sidebar-collapsed:64px;--header-height:60px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--gray-100);color:var(--gray-800);line-height:1.6;overflow:hidden;height:100vh}
a{text-decoration:none;color:var(--primary)}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font);outline:none;border:1px solid var(--gray-300);border-radius:var(--radius-sm);padding:6px 12px;font-size:13px}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}

/* ===== LAYOUT ===== */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-width);background:linear-gradient(180deg,#1E3A8A 0%,#1E40AF 100%);color:#fff;display:flex;flex-direction:column;transition:width .3s;overflow:hidden;flex-shrink:0;z-index:100}
.sidebar.collapsed{width:var(--sidebar-collapsed)}
.sidebar-header{height:var(--header-height);display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0}
.sidebar-logo{width:36px;height:36px;background:linear-gradient(135deg,#3B82F6,#1E40AF);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.sidebar-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden}
.sidebar.collapsed .sidebar-title{display:none}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:4px}

/* ===== MENU ITEMS ===== */
.menu-group{}
.menu-group-title{padding:8px 16px;font-size:11px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;overflow:hidden}
.sidebar.collapsed .menu-group-title{text-align:center;padding:8px 4px;font-size:9px}
.menu-item{display:flex;align-items:center;padding:10px 16px;cursor:pointer;transition:all .2s;gap:12px;position:relative;color:rgba(255,255,255,0.85);white-space:nowrap;overflow:hidden;border-radius:8px;margin:2px 8px}
.menu-item:hover{background:rgba(255,255,255,0.08);color:#fff}
.menu-item.active{background:var(--primary);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(59,130,246,0.3)}
.menu-item .icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.menu-item .label{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis}
.menu-item .arrow{font-size:10px;transition:transform .2s;flex-shrink:0;color:rgba(255,255,255,0.6)}
.menu-item.expanded .arrow{transform:rotate(90deg)}
.sidebar.collapsed .menu-item{justify-content:center;padding:10px 0;margin:2px 4px}
.sidebar.collapsed .menu-item .label,.sidebar.collapsed .menu-item .arrow{display:none}
.submenu{overflow:hidden;max-height:0;transition:max-height .35s ease-out;opacity:0}
.submenu.open{max-height:2000px;opacity:1}
.submenu .menu-item{padding-left:48px;font-size:12.5px;margin:2px 8px 2px 12px;background:transparent}
.submenu .submenu .menu-item{padding-left:68px;font-size:12px}
.submenu .menu-item.active{background:rgba(59,130,246,0.25);color:#fff}

/* ===== MAIN AREA ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh}
.header{height:var(--header-height);background:#fff;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;box-shadow:var(--shadow-sm);z-index:50}
.header-toggle{display:none}
.header-breadcrumb{flex:1;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray-500)}
.header-breadcrumb span{color:var(--gray-800);font-weight:500}
.header-search{position:relative;width:280px;display:none}
.header-search input{width:100%;padding:8px 12px 8px 36px;border-radius:20px;background:var(--gray-100);border:1px solid transparent}
.header-search input:focus{background:#fff;border-color:var(--primary)}
.header-search::before{content:'Q';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--gray-400);font-weight:700}
.header-actions{display:flex;align-items:center;gap:8px}
.header-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:none;font-size:18px;color:var(--gray-600);position:relative;transition:all .2s}
.header-btn:hover{background:var(--gray-100);color:var(--primary)}
.header-btn .dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid #fff;z-index:1}
.header-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(59,130,246,0.3)}
@media (min-width:768px){.header-search{display:block}}

/* ===== DISEASE SWITCHER ===== */
.disease-switcher{
  position: relative;
  min-width: 220px;
  z-index: 100;
}
.disease-switcher-trigger{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 16px;
  background:transparent;
  border:none;
  border-radius:var(--radius-lg);
  cursor:pointer;
  transition:all .2s;
  width:100%;
}
.disease-switcher-trigger:hover{
  background:var(--primary-bg);
}
.disease-switcher-trigger-icon{
  width:28px;height:28px;border-radius:8px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;
  font-family: 'Segoe UI', sans-serif;
}
.disease-switcher-trigger-info{
  flex:1;display:flex;flex-direction:column;align-items:flex-start;
}
.disease-switcher-trigger-name{
  font-size:14px;font-weight:600;color:var(--gray-800);
}
.disease-switcher-trigger-desc{
  font-size:11px;color:var(--gray-500);
}
.disease-switcher-trigger-arrow{
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--gray-500);
  transition:transform .2s;flex-shrink:0;
}
.disease-switcher-trigger-arrow.open{transform:rotate(180deg);}

.disease-switcher-dropdown{
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  border:1px solid var(--gray-200);overflow:hidden;display:none;animation:slideDown .2s ease;
}
.disease-switcher-dropdown.open{display:block;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.disease-switcher-search{
  padding:12px;border-bottom:1px solid var(--gray-200);
}
.disease-switcher-search input{
  width:100%;padding:10px 12px 10px 36px;border-radius:8px;border:1px solid var(--gray-300);
}
.disease-switcher-search::before{
  content:'Q';position:absolute;left:24px;top:20px;font-size:14px;opacity:0.6;font-weight:700;
}

.disease-switcher-list{
  max-height:320px;overflow-y:auto;
}
.disease-switcher-list::-webkit-scrollbar{width:4px;}
.disease-switcher-list::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:4px;}

.disease-switcher-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;
  transition:all .2s;position:relative;
}
.disease-switcher-item:hover{background:var(--primary-bg);}
.disease-switcher-item.active{background:linear-gradient(90deg,var(--primary-bg),#fff);border-left:3px solid var(--primary);}
.disease-switcher-item-icon{width:32px;height:32px;border-radius:8px;background:var(--primary-bg);color:var(--primary);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.disease-switcher-item-info{flex:1;display:flex;flex-direction:column;}
.disease-switcher-item-name{font-size:13px;font-weight:600;color:var(--gray-800);}
.disease-switcher-item-dept{font-size:11px;color:var(--gray-500);margin-top:2px;}
.disease-switcher-item-badge{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-500);}
.disease-switcher-item-check{display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:var(--primary);font-size:16px;}
.disease-switcher-item.active .disease-switcher-item-check{display:block;}

.disease-switcher-loading, .disease-switcher-error{
  padding:32px 16px;text-align:center;
}
.disease-switcher-loading-icon{font-size:32px;animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.disease-switcher-loading-text{font-size:13px;color:var(--gray-600);margin-top:8px;}
.disease-switcher-error{color:var(--danger);}
.disease-switcher-error-btn{margin-top:12px;padding:8px 16px;border-radius:8px;border:1px solid var(--gray-300);
  background:#fff;cursor:pointer;transition:all .2s;}
.disease-switcher-error-btn:hover{border-color:var(--primary);color:var(--primary);}

.disease-switcher-toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:2000;
  background:#fff;padding:12px 20px;border-radius:12px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:12px;
  animation:fadeInUp .3s ease;
}
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.disease-switcher-toast-icon{font-size:20px;}
.disease-switcher-toast-text{font-size:14px;color:var(--gray-700);}
.disease-switcher-toast.success .disease-switcher-toast-icon{color:var(--success);}
.disease-switcher-toast.error .disease-switcher-toast-icon{color:var(--danger);}
.disease-switcher-toast.warning .disease-switcher-toast-icon{color:var(--warning);}

.disease-switcher-overlay{
  position:fixed;inset:0;z-index:99;display:none;
}

/* ===== DATA CENTER LAYOUT ===== */
.data-center-layout{display:grid;grid-template-columns:260px 1fr;grid-template-rows:1fr;gap:20px;flex:1;min-height:0}
@media (max-width:992px){.data-center-layout{grid-template-columns:1fr}}
.data-center-sidebar{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;min-height:0}
.data-tree-header{padding:14px 16px;border-bottom:1px solid var(--gray-100);display:flex;justify-content:space-between;align-items:center}
.data-tree-search{padding:10px 12px;border-bottom:1px solid var(--gray-100)}
.data-tree-list{flex:1;overflow-y:auto;padding:8px 0}
.data-tree-list::-webkit-scrollbar{width:4px}
.data-tree-list::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:4px}
.data-tree-group{}
.data-tree-group-title{padding:8px 16px;font-size:13px;font-weight:600;color:var(--gray-700);cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s}
.data-tree-group-title:hover{background:var(--gray-50)}
.tree-arrow{font-size:10px;transition:transform .2s;color:var(--gray-400)}
.data-tree-group.collapsed .tree-arrow{transform:rotate(0deg)}
.data-tree-group.collapsed .tree-arrow{transform:rotate(0deg)}
.data-tree-group.collapsed .data-tree-items{display:none}
.tree-count{font-size:11px;color:var(--gray-400);font-weight:400;margin-left:auto}
.data-tree-items{}
.data-tree-item{padding:6px 16px 6px 32px;font-size:12px;color:var(--gray-600);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.data-tree-item:hover{background:var(--primary-bg);color:var(--primary)}
.data-tree-item.active{background:var(--primary-bg);color:var(--primary);font-weight:600;border-left-color:var(--primary)}
.data-center-content{min-width:0;display:flex;flex-direction:column}
.data-center-content > .card{flex:1;display:flex;flex-direction:column;overflow:hidden}
.data-center-content > .card > .card-body{flex:1;overflow-y:auto}

/* ETL Topology */
.etl-topology{display:flex;align-items:center;gap:8px;overflow-x:auto;padding:16px 0}
.etl-node{background:#fff;border:2px solid var(--gray-200);border-radius:var(--radius-lg);padding:16px;min-width:140px;flex-shrink:0;transition:all .2s}
.etl-node:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.etl-node-header{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--gray-700)}
.etl-node-items{display:flex;flex-wrap:wrap;gap:6px}
.etl-item{padding:4px 10px;background:var(--gray-50);border-radius:6px;font-size:11px;color:var(--gray-600)}
.etl-arrow{color:var(--primary);font-weight:600;font-size:12px;white-space:nowrap;flex-shrink:0}
.etl-source{border-color:var(--warning)}
.etl-rdr{border-color:var(--primary)}
.etl-standard{border-color:var(--success)}
.etl-consume{border-color:var(--info)}

/* Blood Line Canvas */
.blood-line-canvas{display:flex;align-items:center;gap:8px;overflow-x:auto;padding:16px 0}
.blood-node{background:#fff;border:2px solid var(--gray-200);border-radius:var(--radius);padding:12px 16px;min-width:160px;flex-shrink:0;transition:all .2s}
.blood-node:hover{box-shadow:var(--shadow)}
.blood-node-header{font-size:12px;font-weight:600;color:var(--gray-800);margin-bottom:4px}
.blood-node-fields{font-size:11px;color:var(--gray-500);font-family:monospace}
.blood-node-alert{border-color:var(--warning);background:var(--warning-bg)}
.blood-arrow{color:var(--gray-400);font-size:11px;white-space:nowrap;flex-shrink:0}

/* ===== KNOWLEDGE PAGE ===== */
.knowledge-section{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--gray-100)}
.knowledge-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.knowledge-section-title{font-size:14px;font-weight:600;color:var(--gray-800);margin-bottom:10px;padding-left:10px;border-left:3px solid var(--primary)}
.knowledge-content{font-size:13px;color:var(--gray-600);line-height:1.8}
.knowledge-content p{margin-bottom:4px}
.knowledge-ref{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--gray-50);border-radius:var(--radius-sm)}

/* Graph Canvas */
.graph-canvas{position:relative;height:360px;background:var(--gray-50);border-radius:var(--radius-lg);border:1px solid var(--gray-200);overflow:hidden}
.graph-lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.graph-center-node{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:12px 20px;background:var(--primary);color:#fff;border-radius:50%;font-size:13px;font-weight:600;z-index:2;box-shadow:0 4px 12px rgba(59,130,246,0.3);white-space:nowrap;cursor:pointer}
.graph-node{position:absolute;padding:6px 14px;border-radius:16px;font-size:11px;font-weight:500;z-index:2;cursor:pointer;transition:all .2s;white-space:nowrap;border:2px solid transparent}
.graph-node:hover{transform:scale(1.1);box-shadow:var(--shadow)}
.graph-disease{background:#fff;border-color:var(--primary);color:var(--primary)}
.graph-drug{background:#fff;border-color:var(--success);color:var(--success)}
.graph-check{background:#fff;border-color:var(--warning);color:var(--warning)}
.graph-treat{background:#fff;border-color:var(--info);color:var(--info)}

/* ===== PATHWAY PAGE ===== */
.pathway-kpi-charts{display:grid;grid-template-columns:1fr 1.5fr 1fr;gap:16px;margin-top:16px}
@media (max-width:1100px){.pathway-kpi-charts{grid-template-columns:1fr}}
.pathway-ranking-list{display:flex;flex-direction:column;gap:10px}
.pathway-ranking-item{display:flex;align-items:center;gap:12px}
.rank{width:24px;height:24px;border-radius:50%;background:var(--gray-100);color:var(--gray-500);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.rank-1{background:var(--primary);color:#fff}
.rank-2{background:var(--primary-light);color:#fff}
.rank-3{background:var(--success);color:#fff}
.rank-name{font-size:13px;color:var(--gray-700);min-width:140px;white-space:nowrap}
.rank-bar{flex:1;height:8px;background:var(--gray-100);border-radius:4px;overflow:hidden}
.rank-bar .fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:4px}
.rank-value{font-size:13px;font-weight:600;color:var(--primary);min-width:48px;text-align:right}

/* Pathway 12-Node Timeline */
.pathway-nodes-timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media (max-width:1200px){.pathway-nodes-timeline{grid-template-columns:repeat(3,1fr)}}
@media (max-width:768px){.pathway-nodes-timeline{grid-template-columns:repeat(2,1fr)}}
.pathway-node-item{display:flex;gap:12px;padding:14px;border-radius:var(--radius);border:2px solid var(--gray-200);background:#fff;transition:all .2s;cursor:pointer;position:relative}
.pathway-node-item:hover{border-color:var(--primary-light);box-shadow:var(--shadow-sm)}
.pathway-node-item.completed{border-color:var(--success);background:var(--success-bg)}
.pathway-node-item.current{border-color:var(--primary);background:var(--primary-bg);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.pathway-node-marker{width:32px;height:32px;border-radius:50%;background:var(--gray-100);color:var(--gray-500);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.pathway-node-item.completed .pathway-node-marker{background:var(--success);color:#fff}
.pathway-node-item.current .pathway-node-marker{background:var(--primary);color:#fff;animation:pulse 1.5s infinite}
.pathway-node-content{flex:1;min-width:0}
.pathway-node-title{font-size:13px;font-weight:600;color:var(--gray-800);margin-bottom:2px}
.pathway-node-desc{font-size:11px;color:var(--gray-500);margin-bottom:4px}
.pathway-node-meta{font-size:10px;color:var(--gray-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.content{flex:1;overflow-y:auto;padding:24px;background:var(--gray-100)}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:4px}

/* ===== PAGE COMPONENTS ===== */
.page{display:none;animation:fadeIn .3s}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:16px}
.page-header-left h2{font-size:20px;font-weight:700;color:var(--gray-900);margin-bottom:4px}
.page-header-left p{font-size:13px;color:var(--gray-500)}
.page-header-right{display:flex;gap:8px;flex-wrap:wrap}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,0.3)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#0da272}
.btn-warning{background:var(--warning);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:#fff;color:var(--gray-700);border:1px solid var(--gray-300)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-bg)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-lg{padding:10px 24px;font-size:14px}

/* Stat Cards */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;transition:transform .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}.stat-icon svg{display:block}
.stat-icon.blue{background:var(--primary-bg);color:var(--primary)}
.stat-icon.green{background:var(--success-bg);color:var(--success)}
.stat-icon.yellow{background:var(--warning-bg);color:var(--warning)}
.stat-icon.red{background:var(--danger-bg);color:var(--danger)}
.stat-icon.purple{background:var(--info-bg);color:var(--info)}
.stat-info{flex:1}
.stat-info .value{font-size:26px;font-weight:700;color:var(--gray-900);line-height:1.2}
.stat-info .label{font-size:13px;color:var(--gray-500);margin-top:4px}
.stat-info .trend{font-size:11px;margin-top:6px;display:flex;align-items:center;gap:4px}
.stat-info .trend.up{color:var(--success)}
.stat-info .trend.down{color:var(--danger)}

/* Cards */
.card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.card:last-child{margin-bottom:0}
.card-header{padding:16px 20px;border-bottom:1px solid var(--gray-100);display:flex;justify-content:space-between;align-items:center}
.card-header h3{font-size:15px;font-weight:600;color:var(--gray-800)}
.card-body{padding:20px}

/* Tables */
.table-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.table-filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.table-filters input,.table-filters select{height:34px}
table{width:100%;border-collapse:collapse}
thead{background:var(--gray-50)}
th{padding:10px 16px;text-align:left;font-weight:600;font-size:12px;color:var(--gray-600);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--gray-200);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--gray-100);font-size:13px;vertical-align:middle}
tbody tr:hover{background:var(--primary-bg)}
.table-wrapper{overflow-x:auto;overflow-y:auto}
.table-wrapper table{width:100%}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500}
.tag-success{background:var(--success-bg);color:var(--success)}
.tag-warning{background:var(--warning-bg);color:var(--warning)}
.tag-danger{background:var(--danger-bg);color:var(--danger)}
.tag-info{background:var(--info-bg);color:var(--info)}
.tag-primary{background:var(--primary-bg);color:var(--primary)}
.tag-gray{background:var(--gray-100);color:var(--gray-600)}

/* Progress */
.progress-bar{height:8px;background:var(--gray-200);border-radius:4px;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:4px;transition:width .5s;background:linear-gradient(90deg,var(--primary),var(--primary-light))}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:20px;background:#fff;border-radius:var(--radius-lg) var(--radius-lg) 0 0;box-shadow:var(--shadow-sm)}
.tab{padding:12px 24px;font-size:13px;font-weight:500;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab:hover{color:var(--gray-700);background:var(--gray-50)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);background:var(--primary-bg);font-weight:600}

/* Cards Grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.disease-card{background:#fff;border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s;border:2px solid transparent;position:relative}
.disease-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--primary-light)}
.disease-card .card-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.disease-card .card-icon{width:44px;height:44px;border-radius:12px;background:var(--primary-bg);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.disease-card .card-name{font-size:15px;font-weight:600;color:var(--gray-800)}
.disease-card .card-icd{font-size:11px;color:var(--gray-400);margin-top:4px}
.disease-card .card-stats{display:flex;gap:16px;font-size:12px;color:var(--gray-500);margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-100)}
.disease-card .card-stats span{display:flex;align-items:center;gap:4px}

/* Timeline */
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--gray-200)}
.timeline-item{position:relative;margin-bottom:20px}
.timeline-item::before{content:'';position:absolute;left:-25px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--primary);background:#fff;z-index:1}
.timeline-item.completed::before{background:var(--primary)}
.timeline-item .time{font-size:12px;color:var(--gray-400);margin-bottom:4px}
.timeline-item .content{font-size:13px;color:var(--gray-700)}
.timeline-item .person{font-size:12px;color:var(--gray-500)}

/* Path Progress */
.path-progress{display:flex;align-items:center;gap:4px;margin:8px 0}
.path-node{flex:1;height:8px;border-radius:4px;background:var(--gray-200);position:relative;transition:background .3s}
.path-node.done{background:var(--success)}
.path-node.current{background:var(--primary);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;animation:fadeInOverlay .2s}
.modal-overlay.show{display:flex}
@keyframes fadeInOverlay{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:var(--radius-lg);width:90%;max-width:640px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;font-weight:600;color:var(--gray-900)}
.modal-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:none;font-size:18px;color:var(--gray-400);transition:all .2s}
.modal-close:hover{background:var(--gray-100);color:var(--gray-700)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:8px}

/* Form */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--gray-700);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%}
.form-group textarea{min-height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media (max-width:640px){.form-row{grid-template-columns:1fr}}

/* Drawer */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:900;animation:fadeInOverlay .2s}
.drawer-overlay.show{display:block}
.drawer{position:fixed;right:-720px;top:0;width:720px;max-width:90%;height:100%;background:#fff;z-index:901;transition:right .3s;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,0.1)}
.drawer.show{right:0}
.drawer-header{padding:16px 20px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.drawer-header h3{font-size:16px;font-weight:600;color:var(--gray-900)}
.drawer-body{padding:20px}
.drawer-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:none;font-size:18px;color:var(--gray-400);transition:all .2s}
.drawer-close:hover{background:var(--gray-100);color:var(--gray-700)}

/* Patient Card */
.patient-card{background:#fff;border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow);display:flex;gap:16px;align-items:flex-start;margin-bottom:12px;transition:transform .2s}
.patient-card:hover{transform:translateX(4px);box-shadow:var(--shadow-lg)}
.patient-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--info));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;flex-shrink:0}
.patient-info{flex:1}
.patient-info .name{font-size:15px;font-weight:600;color:var(--gray-900);margin-bottom:4px}
.patient-info .meta{font-size:12px;color:var(--gray-500);display:flex;gap:12px;flex-wrap:wrap}
.patient-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.patient-actions{display:flex;flex-direction:column;gap:8px}

/* Todo List */
.todo-item{display:flex;gap:12px;padding:14px 16px;background:#fff;border-radius:var(--radius-lg);margin-bottom:10px;align-items:flex-start;box-shadow:var(--shadow-sm);transition:all .2s}
.todo-item:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.todo-priority{width:4px;height:auto;min-height:20px;border-radius:2px;flex-shrink:0}
.todo-priority.high{background:var(--danger)}
.todo-priority.medium{background:var(--warning)}
.todo-priority.low{background:var(--success)}
.todo-content{flex:1}
.todo-title{font-size:14px;font-weight:500;color:var(--gray-800);margin-bottom:4px}
.todo-desc{font-size:12px;color:var(--gray-500);margin-bottom:6px}
.todo-meta{display:flex;gap:12px;font-size:11px;color:var(--gray-400);flex-wrap:wrap}

/* Quick Actions */
.quick-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.quick-action{background:#fff;border-radius:var(--radius-lg);padding:20px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm);border:2px solid transparent}
.quick-action:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--primary-light);background:var(--primary-bg)}
.quick-action .icon{font-size:32px;margin-bottom:10px}
.quick-action .label{font-size:14px;font-weight:600;color:var(--gray-800)}
.quick-action .desc{font-size:11px;color:var(--gray-500);margin-top:4px}

/* Breadcrumb Path */
.breadcrumb-path{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.breadcrumb-path-item{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border-radius:20px;font-size:12px;color:var(--gray-600);cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm)}
.breadcrumb-path-item:hover{background:var(--primary-bg);color:var(--primary)}
.breadcrumb-path-item.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,0.3)}

/* Grid Layout */
.two-col{display:grid;grid-template-columns:1.5fr 1fr;grid-template-rows:1fr;gap:14px;align-items:stretch}
@media (max-width:992px){.two-col{grid-template-columns:1fr}}
.two-col > .card{display:flex;flex-direction:column}
.two-col > .card > .card-body{flex:1;overflow:auto}
.two-col > .card:last-child,.two-col > div > .card:last-child{flex:1}
.two-col > div:only-child > .card,.two-col > div:first-child > .card:last-child{flex:1}
.two-col > .card-body:last-child,.two-col > div:last-child > .card-body:last-child{flex:1}

/* Chart Placeholder */
.chart-placeholder{height:200px;background:linear-gradient(15deg,var(--gray-50),var(--gray-100));border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;color:var(--gray-400);font-size:14px}

/* Responsive */
@media (max-width:768px){
  .sidebar{position:fixed;left:-280px;height:100%;z-index:200;box-shadow:4px 0 20px rgba(0,0,0,0.2)}
  .sidebar.open{left:0}
  .main{margin-left:0}
  .stats-row{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:1fr}
}

/* ===================================================================
   模块化系统扩展样式
   =================================================================== */

/* Module Container */
#module-container {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  background: var(--gray-100);
  position: relative;
  display: flex;
  flex-direction: column;
}

/* Module Content - fill container */
.module-loaded {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

/* Cards stretch to bottom */
.module-loaded > .card {
  flex: 0 0 auto;
}
.module-loaded > .card:last-child {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  overflow: visible;
}
.module-loaded > .card:last-child > .card-body {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.module-loaded > .card:last-child > .card-header {
  flex-shrink: 0;
}

/* Table wrapper fills remaining space */
.module-loaded > .card:last-child > .card-body > .table-wrapper,
.module-loaded > .card:last-child > .card-body > .table-responsive {
  flex: 1;
  overflow-y: auto;
}
.module-loaded > .card:last-child > .card-body > .table-wrapper table,
.module-loaded > .card:last-child > .card-body > .table-responsive table {
  min-height: 100%;
}

/* Stats-row cards: make last row stretch */
.module-loaded > .stats-row + .card {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
}

/* Ensure consistent left-right alignment */
.module-loaded > .card {
  margin-left: 0;
  margin-right: 0;
}

/* Module Loading State */
.module-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 400px;
  flex-direction: column;
  gap: 16px;
}
.module-loading .spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--gray-200);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* Version Badge */
.version-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  margin-top: auto;
  cursor: pointer;
  transition: all 0.2s;
}
.version-badge:hover {
  background: rgba(255,255,255,0.2);
  color: #fff;
}

/* Version Panel */
.version-panel {
  position: fixed;
  right: -420px;
  top: 0;
  width: 400px;
  height: 100vh;
  background: #fff;
  box-shadow: -4px 0 20px rgba(0,0,0,0.15);
  z-index: 1100;
  transition: right 0.3s;
  display: flex;
  flex-direction: column;
}
.version-panel.open { right: 0; }
.version-panel-header {
  padding: 20px;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.version-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.version-item {
  padding: 12px;
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.version-item:hover {
  border-color: var(--primary);
  background: var(--primary-bg);
}
.version-item.current {
  border-color: var(--primary);
  background: var(--primary-bg);
}
.version-item .version-tag {
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-800);
}
.version-item .version-time {
  font-size: 11px;
  color: var(--gray-500);
  margin-top: 4px;
}
.version-item .version-changes {
  font-size: 12px;
  color: var(--gray-600);
  margin-top: 6px;
}
.version-item .version-actions {
  margin-top: 8px;
  display: flex;
  gap: 8px;
}

/* Module Transition */
.module-enter {
  animation: moduleFadeIn 0.3s ease;
}
@keyframes moduleFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Sidebar Footer */
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}

/* Toast Container */
.toast-container {
  position: fixed;
  top: 80px;
  right: 20px;
  z-index: 3000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: #fff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  font-size: 13px;
  color: var(--gray-700);
  animation: toastSlideIn 0.3s ease;
  min-width: 240px;
}
.toast.toast-exit {
  animation: toastSlideOut 0.3s ease forwards;
}
.toast-icon { font-size: 18px; flex-shrink: 0; }
.toast.success .toast-icon { color: var(--success); }
.toast.error .toast-icon { color: var(--danger); }
.toast.warning .toast-icon { color: var(--warning); }
.toast.info .toast-icon { color: var(--info); }

@keyframes toastSlideIn {
  from { opacity: 0; transform: translateX(100%); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes toastSlideOut {
  from { opacity: 1; transform: translateX(0); }
  to { opacity: 0; transform: translateX(100%); }
}

/* Version Management Modal Overrides */
.version-modal .modal {
  max-width: 520px;
}
.version-modal .modal-body {
  padding: 0;
}
.version-modal .version-detail {
  padding: 20px;
}
.version-modal .version-detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.version-modal .version-detail-tag {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
}
.version-modal .version-detail-time {
  font-size: 12px;
  color: var(--gray-500);
}
.version-modal .version-change-list {
  list-style: none;
  padding: 0;
}
.version-modal .version-change-list li {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 0;
  font-size: 13px;
  color: var(--gray-600);
}
.version-modal .version-change-list li::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--primary);
  margin-top: 6px;
  flex-shrink: 0;
}

  <div class="app">
    <aside class="sidebar" id="sidebar">

      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <div class="version-badge" id="versionBadge" title="版本管理">
          <span>&#x2734;</span>
          <span id="versionBadgeText">v1.0.0</span>
        </div>
      </div>

    <main class="main">

        <div class="disease-switcher" id="diseaseSwitcher"></div>

            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="dot"></span>
          </button>

          <div class="header-avatar" title="用户中心">L</div>

  <div class="version-panel" id="versionPanel">
    <div class="version-panel-header">

      <button class="modal-close" id="versionPanelClose">&times;</button>

    <div class="version-panel-body" id="versionPanelBody">

        <h3>版本详情</h3>
        <button class="modal-close" id="versionModalClose">&times;</button>
      </div>
      <div class="modal-body" id="versionModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="versionModalCancel">关闭</button>
        <button class="btn btn-primary" id="versionModalConfirm">确认切换</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>/**
 * Centralized State Manager
 * 响应式状态管理，支持订阅与通知机制
 */
const AppState = {
  _state: {
    currentPage: 'workbench',
    currentModule: null,
    expandedMenus: new Set(),
    sidebarCollapsed: false,
    moduleCache: new Map(),
    moduleVersions: new Map(),
    selectedDisease: null,
    searchQuery: ''
  },

  _listeners: new Map(),

  get(key) { return this._state[key]; },

  set(key, value) {
    const old = this._state[key];
    this._state[key] = value;
    this._notify(key, value, old);
  },

  on(key, callback) {
    if (!this._listeners.has(key)) this._listeners.set(key, []);
    this._listeners.get(key).push(callback);
    return () => {
      const arr = this._listeners.get(key);
      const idx = arr.indexOf(callback);
      if (idx > -1) arr.splice(idx, 1);
    };
  },

  _notify(key, value, old) {
    (this._listeners.get(key) || []).forEach(cb => cb(value, old));
  }
};

/**
 * DiseaseSwitcher Component
 * 病种切换组件，支持搜索、键盘导航、多病种切换
 * 从原始单体应用迁移至模块化架构
 */
const DiseaseSwitcher = {
  // 状态管理
  state: {
    isOpen: false,
    isLoading: false,
    isError: false,
    isMultiDiseaseUser: true, // 模拟：拥有多病种权限的用户
    diseases: [],
    selectedDisease: null,
    searchQuery: '',
    focusedIndex: -1
  },

  // 获取病种图标（文字图标）
  getDiseaseIcon(diseaseName) {
    if (diseaseName.includes('心') || diseaseName.includes('心脏病')) return '心';
    if (diseaseName.includes('脑') || diseaseName.includes('神经')) return '脑';
    if (diseaseName.includes('肿瘤') || diseaseName.includes('癌')) return '瘤';
    if (diseaseName.includes('骨') || diseaseName.includes('关节')) return '骨';
    if (diseaseName.includes('肾') || diseaseName.includes('泌尿')) return '肾';
    if (diseaseName.includes('核')) return '核';
    if (diseaseName.includes('肺')) return '肺';
    if (diseaseName.includes('肠') || diseaseName.includes('结直肠')) return '肠';
    return '病';
  },

  // 模拟病种数据
  getMockDiseases() {
    return [
      { id: 'disease1', name: '冠心病 / 急性心肌梗死', dept: '心血管内科', patientCount: 1256, icon: '心' },

      { id: 'disease20', name: '先天性心脏病', dept: '心血管内科', patientCount: 156, icon: '心' }
    ];
  },

  // 初始化
  async init() {
    this.bindEvents();
    const saved = localStorage.getItem('selectedDisease');
    if (saved) {
      this.state.selectedDisease = JSON.parse(saved);
    }
    await this.loadDiseases();
  },

  // 绑定事件
  bindEvents() {
    const overlay = document.getElementById('diseaseSwitcherOverlay');
    if (overlay) {
      overlay.addEventListener('click', () => this.close());
    }
    document.addEventListener('keydown', (e) => this.handleKeyDown(e));
  },

  // 键盘事件处理
  handleKeyDown(e) {
    if (!this.state.isOpen) return;

    const filtered = this.getFilteredDiseases();

    switch (e.key) {
      case 'ArrowDown':
        e.preventDefault();
        this.state.focusedIndex = Math.min(this.state.focusedIndex + 1, filtered.length - 1);
        this.highlightItem();
        break;
      case 'ArrowUp':
        e.preventDefault();
        this.state.focusedIndex = Math.max(this.state.focusedIndex - 1, 0);
        this.highlightItem();
        break;
      case 'Enter':
        e.preventDefault();
        if (this.state.focusedIndex >= 0 && this.state.focusedIndex < filtered.length) {
          this.selectDisease(filtered[this.state.focusedIndex]);
        }
        break;
      case 'Escape':
        e.preventDefault();
        this.close();
        break;
    }
  },

  highlightItem() {
    const items = document.querySelectorAll('.disease-switcher-item');
    items.forEach((item, index) => {
      if (index === this.state.focusedIndex) {
        item.style.background = 'var(--primary-bg)';
        item.scrollIntoView({ block: 'nearest' });
      } else {
        item.style.background = '';
      }
    });
  },

  // 加载病种数据（模拟API）
  async loadDiseases() {
    if (!this.state.isMultiDiseaseUser) return;

    this.state.isLoading = true;
    this.state.isError = false;
    this.render();

    try {
      await new Promise(resolve => setTimeout(resolve, 800));

      this.state.diseases = this.getMockDiseases();
      if (!this.state.selectedDisease) {
        this.state.selectedDisease = this.state.diseases[0];
      }
      this.state.isLoading = false;
      this.render();
    } catch (error) {
      this.state.isLoading = false;
      this.state.isError = true;
      this.render();
    }
  },

  // 重试加载
  async retry() {
    await this.loadDiseases();
  },

  // 获取过滤后的病种列表
  getFilteredDiseases() {
    if (!this.state.searchQuery) return this.state.diseases;
    const query = this.state.searchQuery.toLowerCase();
    return this.state.diseases.filter(d =>
      d.name.toLowerCase().includes(query) ||
      d.dept.toLowerCase().includes(query)
    );
  },

  // 切换下拉框
  toggle() {
    if (this.state.isOpen) {
      this.close();
    } else {
      this.open();
    }
  },

  open() {
    this.state.isOpen = true;
    this.state.searchQuery = '';
    this.state.focusedIndex = -1;
    this.render();
    const overlay = document.getElementById('diseaseSwitcherOverlay');
    if (overlay) overlay.style.display = 'block';
  },

  close() {
    this.state.isOpen = false;
    this.render();
    const overlay = document.getElementById('diseaseSwitcherOverlay');
    if (overlay) overlay.style.display = 'none';
  },

  // 通过索引选择病种
  async selectDiseaseByIndex(index) {
    const disease = this.getFilteredDiseases()[index];
    if (!disease) return;
    await this.selectDisease(disease);
  },

  // 选择病种
  async selectDisease(disease) {
    // 权限验证
    const hasPermission = this.state.diseases.some(d => d.id === disease.id);
    if (!hasPermission) {
      this.showToast('error', '您没有权限访问此病种');
      return;
    }

    this.state.selectedDisease = disease;
    this.close();

    // 保存到localStorage
    localStorage.setItem('selectedDisease', JSON.stringify(disease));

    // 同步到全局状态
    if (typeof AppState !== 'undefined') {
      AppState.set('selectedDisease', disease);
    }

    // 加载状态
    this.showToast('success', `正在切换到「${disease.name}」...`);
    await new Promise(resolve => setTimeout(resolve, 1000));

    // 切换成功
    this.showToast('success', `已切换到「${disease.name}」`);

    // 触发系统联动
    this.updateSystemData(disease);
    this.render();
  },

  // 更新系统数据
  updateSystemData(disease) {
    console.log('Updating system data for:', disease.name);

    // 模拟更新统计数据
    const stats = document.querySelectorAll('.stat-info .value');
    stats.forEach(stat => {
      stat.style.animation = 'pulse .3s ease';
      setTimeout(() => stat.style.animation = '', 300);
    });

    // 触发病种切换事件
    const event = new CustomEvent('disease:changed', { detail: { disease } });
    document.dispatchEvent(event);
  },

  // 显示提示信息
  showToast(type, message) {
    const container = document.getElementById('diseaseSwitcherToast');
    if (!container) return;

    const icons = { success: '✓', error: '×', warning: '!' };

    container.innerHTML = `
      <div class="disease-switcher-toast ${type}">
        <span class="disease-switcher-toast-icon">${icons[type]}</span>
        <span class="disease-switcher-toast-text">${message}</span>
      </div>
    `;

    setTimeout(() => {
      container.innerHTML = '';
    }, 3000);
  },

  // 渲染
  render() {
    const container = document.getElementById('diseaseSwitcher');
    if (!container) return;

    // 如果是单病种权限用户，不显示
    if (!this.state.isMultiDiseaseUser) {
      container.style.display = 'none';
      return;
    }

    container.style.display = 'block';

    container.innerHTML = `
      <div class="disease-switcher-trigger" onclick="DiseaseSwitcher.toggle()">
        <div class="disease-switcher-trigger-icon">
          ${this.state.selectedDisease ? this.state.selectedDisease.icon : '选'}
        </div>
        <div class="disease-switcher-trigger-info">
          <div class="disease-switcher-trigger-name">
            ${this.state.selectedDisease ? this.state.selectedDisease.name : '请选择病种'}
          </div>
        </div>
        <div class="disease-switcher-trigger-arrow ${this.state.isOpen ? 'open' : ''}">▾</div>
      </div>

      <div class="disease-switcher-dropdown ${this.state.isOpen ? 'open' : ''}">
        ${this.state.isLoading ? `
          <div class="disease-switcher-loading">
            <div class="disease-switcher-loading-icon">···</div>
            <div class="disease-switcher-loading-text">正在加载病种列表...</div>
          </div>
        ` : this.state.isError ? `
          <div class="disease-switcher-error">
            <div style="font-size:24px;margin-bottom:8px">×</div>
            <div>加载失败，请重试</div>
            <button class="disease-switcher-error-btn" onclick="DiseaseSwitcher.retry()">重新加载</button>
          </div>
        ` : `
          <div class="disease-switcher-search">
            <input type="text" placeholder="搜索病种..." value="${this.state.searchQuery}"
              oninput="DiseaseSwitcher.state.searchQuery = this.value;DiseaseSwitcher.state.focusedIndex=-1;DiseaseSwitcher.render();">
          </div>
          <div class="disease-switcher-list">
            ${this.getFilteredDiseases().length === 0 ? `
              <div style="padding:32px;text-align:center;color:var(--gray-500);">未找到匹配的病种</div>
            ` : this.getFilteredDiseases().map((disease, index) => `
              <div class="disease-switcher-item ${this.state.selectedDisease?.id === disease.id ? 'active' : ''}"
                onclick="DiseaseSwitcher.selectDiseaseByIndex(${index})"
                onmouseenter="DiseaseSwitcher.state.focusedIndex=-1">
                <div class="disease-switcher-item-icon">${disease.icon}</div>
                <div class="disease-switcher-item-info">
                  <div class="disease-switcher-item-name">${disease.name}</div>
                  <div class="disease-switcher-item-dept">${disease.dept}</div>
                </div>
                <div class="disease-switcher-item-badge">
                  <span>${disease.patientCount}人</span>
                </div>
                <div class="disease-switcher-item-check">✓</div>
              </div>
            `).join('')}
          </div>
        `}
      </div>
    `;
  }
};

/* ===================================================================
 * 专科一体化管理平台 - SVG 图表库
 * =================================================================== */

const Charts = {
  // 生成渐变色定义
  _generateGradient: (id, color1, color2) => `
    <linearGradient id="${id}" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:${color1};stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:${color2};stop-opacity:0.1" />
    </linearGradient>
  `,

  // 折线图
  lineChart: (data, options = {}) => {
    const { 
      width = 600, 
      height = 220, 
      color = '#3B82F6', 
      labelColor = '#64748B',
      gridColor = '#e5e7eb',
      showArea = true,
      showPoints = true
    } = options;

    const padding = { top: 20, right: 20, bottom: 40, left: 50 };
    const chartWidth = width - padding.left - padding.right;
    const chartHeight = height - padding.top - padding.bottom;

    // 数据处理
    const maxVal = Math.max(...data.map(d => d.value));
    const minVal = Math.min(...data.map(d => d.value));
    const range = maxVal - minVal || 1;

    // 计算点位置
    const points = data.map((d, i) => ({
      x: padding.left + (i / (data.length - 1)) * chartWidth,
      y: padding.top + chartHeight - ((d.value - minVal) / range) * chartHeight,
      label: d.label,
      value: d.value
    }));

    // 生成路径
    const linePath = points.map((p, i) => 
      (i === 0 ? 'M' : 'L') + `${p.x},${p.y}`
    ).join(' ');

    const areaPath = linePath + 
      ` L${points[points.length - 1].x},${padding.top + chartHeight} L${points[0].x},${padding.top + chartHeight} Z`;

    // 生成网格线
    const gridLines = [];
    const numYLines = 4;
    for (let i = 0; i <= numYLines; i++) {
      const y = padding.top + (i / numYLines) * chartHeight;
      const val = maxVal - (i / numYLines) * range;
      gridLines.push(`<line x1="${padding.left}" y1="${y}" x2="${padding.left + chartWidth}" y2="${y}" stroke="${gridColor}" stroke-width="1"/>`);
      gridLines.push(`<text x="${padding.left - 10}" y="${y + 4}" text-anchor="end" fill="${labelColor}" font-size="11">${Math.round(val)}</text>`);
    }

    // 生成X轴标签
    const xLabels = points.map((p, i) => 
      `<text x="${p.x}" y="${padding.top + chartHeight + 25}" text-anchor="middle" fill="${labelColor}" font-size="11">${p.label}</text>`
    );

    // 生成数据点
    const pointElems = points.map(p => 
      `<circle cx="${p.x}" cy="${p.y}" r="4" fill="${color}" stroke="#fff" stroke-width="2"/>`
    );

    return `
      <svg width="100%" height="${height}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet">
        <defs>
          ${Charts._generateGradient('lineGrad', color, color)}
        </defs>
        ${gridLines.join('')}
        ${showArea ? `<path d="${areaPath}" fill="url(#lineGrad)" opacity="0.2"/>` : ''}
        <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${showPoints ? pointElems.join('') : ''}
        ${xLabels.join('')}
      </svg>
    `;
  },

  // 横向柱状图 (Top N)
  horizontalBarChart: (data, options = {}) => {
    const { 
      width = 600, 
      height = 220, 
      colors = ['#3B82F6', '#60A5FA', '#818CF8', '#A78BFA', '#C4B5FD'],
      labelColor = '#64748B',
      barHeight = 28,
      barGap = 12
    } = options;

    const padding = { top: 15, right: 30, bottom: 15, left: 120 };
    const maxVal = Math.max(...data.map(d => d.value));
    const chartHeight = padding.top + data.length * (barHeight + barGap) + padding.bottom;

    const bars = data.map((d, i) => {
      const barWidth = (d.value / maxVal) * (width - padding.left - padding.right);
      const y = padding.top + i * (barHeight + barGap);
      const color = colors[i % colors.length];
      return `
        <g>
          <text x="${padding.left - 10}" y="${y + barHeight/2 + 4}" text-anchor="end" fill="${labelColor}" font-size="12" font-weight="500">${d.label}</text>
          <rect x="${padding.left}" y="${y}" width="${barWidth}" height="${barHeight}" rx="6" fill="${color}" opacity="0.9"/>
          <text x="${padding.left + barWidth + 8}" y="${y + barHeight/2 + 4}" text-anchor="start" fill="${labelColor}" font-size="12" font-weight="600">${d.value}</text>
        </g>
      `;
    });

    return `
      <svg width="100%" height="${chartHeight}" viewBox="0 0 ${width} ${chartHeight}" preserveAspectRatio="xMidYMid meet">
        ${bars.join('')}
      </svg>
    `;
  },

  // 柱状图 (排行榜)
  barChart: (data, options = {}) => {
    const { 
      width = 600, 
      height = 220, 
      color = '#3B82F6', 
      labelColor = '#64748B',
      barWidth = 40
    } = options;

    const padding = { top: 20, right: 20, bottom: 40, left: 50 };
    const chartWidth = width - padding.left - padding.right;
    const chartHeight = height - padding.top - padding.bottom;

    const maxVal = Math.max(...data.map(d => d.value));
    const totalWidth = data.length * barWidth + (data.length - 1) * 16;
    const startX = padding.left + (chartWidth - totalWidth) / 2;

    const bars = data.map((d, i) => {
      const barHeight = (d.value / maxVal) * chartHeight;
      const x = startX + i * (barWidth + 16);
      const y = padding.top + chartHeight - barHeight;
      return `
        <g>
          <rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" rx="6" fill="${color}"/>
          <text x="${x + barWidth/2}" y="${padding.top + chartHeight + 25}" text-anchor="middle" fill="${labelColor}" font-size="11">${d.label}</text>
          <text x="${x + barWidth/2}" y="${y - 8}" text-anchor="middle" fill="${color}" font-size="12" font-weight="600">${d.value}</text>
        </g>
      `;
    });

    // 网格线
    const gridLines = [];
    const numYLines = 4;
    for (let i = 0; i <= numYLines; i++) {
      const y = padding.top + (i / numYLines) * chartHeight;
      const val = maxVal - (i / numYLines) * maxVal;
      gridLines.push(`<line x1="${padding.left}" y1="${y}" x2="${padding.left + chartWidth}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`);
      gridLines.push(`<text x="${padding.left - 10}" y="${y + 4}" text-anchor="end" fill="${labelColor}" font-size="11">${Math.round(val)}</text>`);
    }

    return `
      <svg width="100%" height="${height}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet">
        ${gridLines.join('')}
        ${bars.join('')}
      </svg>
    `;
  },

  // 饼图/环形图
  donutChart: (data, options = {}) => {
    const { 
      width = 280, 
      height = 220, 
      colors = ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#6366F1'],
      innerRadius = 45,
      outerRadius = 80
    } = options;

    const cx = width / 2;
    const cy = height / 2;
    const total = data.reduce((sum, d) => sum + d.value, 0);

    let startAngle = -Math.PI / 2;
    const slices = data.map((d, i) => {
      const endAngle = startAngle + (d.value / total) * 2 * Math.PI;
      const x1 = cx + innerRadius * Math.cos(startAngle);
      const y1 = cy + innerRadius * Math.sin(startAngle);
      const x2 = cx + outerRadius * Math.cos(startAngle);
      const y2 = cy + outerRadius * Math.sin(startAngle);
      const x3 = cx + outerRadius * Math.cos(endAngle);
      const y3 = cy + outerRadius * Math.sin(endAngle);
      const x4 = cx + innerRadius * Math.cos(endAngle);
      const y4 = cy + innerRadius * Math.sin(endAngle);

      const largeArc = (d.value / total) > 0.5 ? 1 : 0;

      const path = `
        M ${x1} ${y1}
        L ${x2} ${y2}
        A ${outerRadius} ${outerRadius} 0 ${largeArc} 1 ${x3} ${y3}
        L ${x4} ${y4}
        A ${innerRadius} ${innerRadius} 0 ${largeArc} 0 ${x1} ${y1}
      `;

      const slice = {
        path,
        color: colors[i % colors.length],
        label: d.label,
        value: d.value,
        percentage: Math.round((d.value / total) * 100)
      };

      startAngle = endAngle;
      return slice;
    });

    return `
      <svg width="100%" height="${height}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet">
        ${slices.map(s => `<path d="${s.path}" fill="${s.color}" />`).join('')}
      </svg>
    `;
  },

  // 年龄分布图表
  ageDistributionChart: (data, options = {}) => {
    const { 
      width = 600, 
      height = 220, 
      color = '#3B82F6', 
      labelColor = '#64748B'
    } = options;

    const padding = { top: 20, right: 20, bottom: 40, left: 50 };
    const chartWidth = width - padding.left - padding.right;
    const chartHeight = height - padding.top - padding.bottom;

    const maxVal = Math.max(...data.map(d => d.value));
    const barWidth = chartWidth / data.length - 8;

    const bars = data.map((d, i) => {
      const barHeight = (d.value / maxVal) * chartHeight;
      const x = padding.left + i * (chartWidth / data.length) + 4;
      const y = padding.top + chartHeight - barHeight;
      return `
        <g>
          <rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" rx="4" fill="${color}" opacity="0.9"/>
          <text x="${x + barWidth/2}" y="${padding.top + chartHeight + 25}" text-anchor="middle" fill="${labelColor}" font-size="11">${d.label}</text>
          <text x="${x + barWidth/2}" y="${y - 6}" text-anchor="middle" fill="${labelColor}" font-size="10" font-weight="600">${d.value}</text>
        </g>
      `;
    });

    return `
      <svg width="100%" height="${height}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet">
        ${bars.join('')}
      </svg>
    `;
  }
};

/**
 * Dynamic Module Loader
 * 模块动态加载器，支持缓存、版本检查与懒加载
 */
const ModuleLoader = {
  container: null,
  loadingIndicator: null,

  /**
   * 初始化模块加载器，获取容器DOM引用
   */
  init() {
    this.container = document.getElementById('module-container');
    this._bindDiseaseChange();
  },

  // 不受病种切换影响的模块（豁免列表）
  _diseaseExempt: new Set(['workbench', 'diseases', 'disease-detail']),

  /**
   * 监听病种切换事件，自动重载当前模块
   */
  _bindDiseaseChange() {
    document.addEventListener('disease:changed', (e) => {
      const currentPage = AppState.get('currentPage');
      if (!currentPage) return;

      // 豁免的模块不重载
      if (this._diseaseExempt.has(currentPage)) return;

      // 清除缓存并重载当前模块
      this.invalidate(currentPage);
      this.load(currentPage);
    });
  },

  /**
   * 按 pageId 加载模块
   * @param {string} pageId - 模块标识，如 'workbench' 或 'data-center/datasets'
   */
  async load(pageId) {
    if (AppState.get('currentPage') === pageId && this.container.querySelector('.module-loaded')) {
      return; // 已加载，跳过
    }

    const modulePath = this._resolvePath(pageId);

    // 检查缓存
    const cached = AppState.get('moduleCache').get(modulePath);
    if (cached && !this._isStale(modulePath, cached)) {
      this._inject(cached.html, pageId);
      return;
    }

    // 显示加载状态
    this._showLoading();

    try {
      const html = await this._fetch(modulePath);
      // 缓存模块
      AppState.get('moduleCache').set(modulePath, {
        html,
        timestamp: Date.now(),
        version: null
      });
      this._inject(html, pageId);
    } catch (err) {
      this._showError(pageId, err);
    }
  },

  /**
   * 将 pageId 解析为模块文件路径
   * @param {string} pageId
   * @returns {string}
   */
  _resolvePath(pageId) {
    const pathMap = {
      'workbench': 'modules/workbench.html',
      'diseases': 'modules/diseases.html',
      'disease-detail': 'modules/disease-detail.html',
      'data-center/datasets': 'modules/data-center/datasets.html',
      'data-center/rdr': 'modules/data-center/rdr.html',
      'data-center/metadata': 'modules/data-center/metadata.html',
      'data-center/ai': 'modules/data-center/ai-governance.html',
      'data-center/standards': 'modules/data-center/standards.html',
      'knowledge/disease': 'modules/knowledge/disease.html',
      'knowledge/graph': 'modules/knowledge/graph.html',
      'knowledge/contraindication': 'modules/knowledge/contraindication.html',
      'records/templates': 'modules/records/templates.html',
      'records/scales': 'modules/records/scales.html',
      'records/elements': 'modules/records/elements.html',
      'pathways/overview': 'modules/pathways/overview.html',
      'pathways/manage': 'modules/pathways/manage.html',

    AppState.set('currentPage', pageId);
    AppState.set('currentModule', pageId);

    // 执行模块内联脚本
    this.container.querySelectorAll('script').forEach(old => {
      const newScript = document.createElement('script');
      newScript.textContent = old.textContent;
      old.parentNode.replaceChild(newScript, old);

   * @param {string} path
   * @param {object} cached
   * @returns {boolean}
   */
  _isStale(path, cached) {
    return Date.now() - cached.timestamp > 5 * 60 * 1000;
  },

  /**
   * 使指定模块缓存失效
   * @param {string} pageId
   */
  invalidate(pageId) {
    const path = this._resolvePath(pageId);
    AppState.get('moduleCache').delete(path);
  },

  /**
   * 使所有模块缓存失效
   */
  invalidateAll() {

  /**

  getCacheStats() {

      totalCached: cache.size,

        path,

        size: data.html.length
      }))
    };
  }
};

/**
 * Version Manager
 * 版本管理器，支持版本跟踪、保存与回滚
 */
const VersionManager = {
  STORAGE_KEY: 'platform_versions',
  CURRENT_VERSION: '2.0.0',

  /**
   * 初始化版本管理器
   */
  init() {
    this._ensureStorage();
    this._renderPanel();
  },

  /**
   * 确保 localStorage 中有初始版本数据
   */
  _ensureStorage() {
    if (!localStorage.getItem(this.STORAGE_KEY)) {
      const initial = {
        currentVersion: this.CURRENT_VERSION,
        versions: [{
          version: this.CURRENT_VERSION,
          timestamp: new Date().toISOString(),
          changes: ['模块化架构重构', '动态按需加载', '版本管理系统'],
          modules: this._snapshotModules(),
          isCurrent: true
        }]
      };
      localStorage.setItem(this.STORAGE_KEY, JSON.stringify(initial));
    }
  },

  /**
   * 从 localStorage 读取版本数据
   * @returns {object}
   */
  _getData() {
    return JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '{}');
  },

  /**
   * 将版本数据写入 localStorage
   * @param {object} data
   */
  _saveData(data) {
    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
  },

  /**
   * 对当前模块缓存做快照
   * @returns {object}
   */
  _snapshotModules() {
    const cache = AppState.get('moduleCache');
    const snapshot = {};
    cache.forEach((val, key) => {
      snapshot[key] = { size: val.html.length, timestamp: val.timestamp };
    });
    return snapshot;
  },

  /**
   * 保存当前状态为新版本
   * @param {string} [version] - 版本号，不传则自动生成
   * @param {string[]} [changes] - 变更说明列表
   * @returns {object} 新版本对象
   */
  saveVersion(version, changes) {
    const data = this._getData();
    // 标记所有旧版本为非当前
    data.versions.forEach(v => v.isCurrent = false);

    const newVersion = {
      version: version || `v${data.versions.length + 1}.0.0`,
      timestamp: new Date().toISOString(),
      changes: changes || [],
      modules: this._snapshotModules(),
      isCurrent: true
    };

    data.versions.unshift(newVersion);
    data.currentVersion = newVersion.version;
    this._saveData(data);
    this._renderPanel();
    this._showToast('success', `版本 ${newVersion.version} 已保存`);
    return newVersion;
  },

  /**
   * 回滚到指定版本
   * @param {string} version - 目标版本号
   */
  rollback(version) {
    const data = this._getData();
    const target = data.versions.find(v => v.version === version);
    if (!target) return;

    // 标记目标版本为当前
    data.versions.forEach(v => v.isCurrent = false);
    target.isCurrent = true;
    data.currentVersion = version;
    this._saveData(data);

    // 使所有缓存模块失效，强制重新加载
    ModuleLoader.invalidateAll();

    this._renderPanel();
    this._showToast('success', `已回滚到版本 ${version}`);

    // 重新加载当前页面
    const currentPage = AppState.get('currentPage');
    ModuleLoader.load(currentPage);
  },

  /**
   * 获取版本历史列表
   * @returns {Array}
   */
  getHistory() {
    return this._getData().versions || [];
  },

  /**
   * 获取当前版本号
   * @returns {string}
   */
  getCurrentVersion() {
    return this._getData().currentVersion || this.CURRENT_VERSION;
  },

  /**
   * 切换版本管理面板的显示状态
   */
  togglePanel() {
    const panel = document.getElementById('versionPanel');
    if (panel) panel.classList.toggle('open');
  },

  /**
   * 渲染版本管理面板内容
   */
  _renderPanel() {
    const panel = document.getElementById('versionPanel');
    if (!panel) return;

    const data = this._getData();
    const versions = data.versions || [];

    panel.innerHTML = `
      <div class="version-panel-header">
        <h3 style="font-size:16px;font-weight:600;">版本管理</h3>
        <button class="btn btn-sm btn-outline" onclick="VersionManager.togglePanel()">关闭</button>
      </div>
      <div class="version-panel-body">
        <div style="margin-bottom:16px;">
          <button class="btn btn-primary" onclick="VersionManager._promptSave()" style="width:100%;">
            保存当前版本
          </button>
        </div>
        <div style="font-size:12px;color:var(--gray-500);margin-bottom:12px;">
          当前版本: <strong style="color:var(--primary)">${data.currentVersion}</strong>
          &nbsp;|&nbsp; 共 ${versions.length} 个版本
        </div>
        ${versions.map(v => `
          <div class="version-item ${v.isCurrent ? 'current' : ''}">
            <div class="version-tag">${v.version} ${v.isCurrent ? '<span class="tag tag-success">当前</span>' : ''}</div>
            <div class="version-time">${new Date(v.timestamp).toLocaleString()}</div>
            <div class="version-changes">${(v.changes || []).join(', ') || '无变更说明'}</div>
            <div class="version-actions">
              ${!v.isCurrent ? `<button class="btn btn-sm btn-outline" onclick="VersionManager.rollback('${v.version}')">回滚</button>` : ''}
            </div>
          </div>
        `).join('')}
        ${versions.length === 0 ? '<div style="text-align:center;color:var(--gray-400);padding:40px;">暂无版本记录</div>' : ''}
      </div>
    `;
  },

  /**
   * 弹出输入框让用户填写版本变更说明
   */
  _promptSave() {
    const changes = prompt('请输入版本变更说明（多个变更用逗号分隔）:');
    if (changes !== null) {
      const version = `v${this._getData().versions.length + 1}.0.0`;
      this.saveVersion(version, changes.split(',').map(c => c.trim()).filter(Boolean));
    }
  },

  /**
   * 显示提示消息
   * @param {string} type - 'success' | 'error' | 'warning'
   * @param {string} message
   */
  _showToast(type, message) {
    const icons = { success: '✓', error: '×', warning: '!' };
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:9999;background:#fff;padding:12px 20px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.15);display:flex;align-items:center;gap:10px;font-size:14px;animation:fadeInUp 0.3s ease;';
    toast.innerHTML = `<span style="color:var(--${type});font-size:18px;">${icons[type]}</span><span>${message}</span>`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
};

  /**
   * 切换菜单展开/收起
   * @param {string} id - 菜单组ID
   * @param {string} pageId - 菜单组对应的页面ID
   * @param {string} firstChildPageId - 第一个子菜单的页面ID
   */
  toggleMenu(id, pageId, firstChildPageId) {
    const expanded = AppState.get('expandedMenus');
    if (expanded.has(id)) {
      expanded.delete(id);
    } else {
      expanded.add(id);
    }
    this.navigate(firstChildPageId || pageId);
  },

  /**
   * 导航到指定页面
   * @param {string} pageId
   */
  navigate(pageId) {
    ModuleLoader.load(pageId);
    this.renderMenu();
  },

  /**
   * 更新菜单激活状态
   * @param {string} pageId
   */
  updateMenuActive(pageId) {
    // 更新激活状态，简单方案为重新渲染菜单
    this.renderMenu();
  },

  /**
   * 切换侧边栏折叠状态
   */
  toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    if (sidebar) sidebar.classList.toggle('collapsed');
    AppState.set('sidebarCollapsed', sidebar.classList.contains('collapsed'));
  },

  /**
   * 切换版本管理面板
   */
  toggleVersionPanel() {
    VersionManager.togglePanel();
  }
};
