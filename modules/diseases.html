<div data-module-id="page-diseases">

          <!-- 学科筛选标签 -->
          <div class="breadcrumb-path" id="diseaseDeptFilter">
            <div class="breadcrumb-path-item active" onclick="DiseaseModule.filterDept('all', this)">全部学科</div>
            <div class="breadcrumb-path-item" onclick="DiseaseModule.filterDept('心血管内科', this)">心血管内科</div>
            <div class="breadcrumb-path-item" onclick="DiseaseModule.filterDept('神经内科', this)">神经内科</div>
            <div class="breadcrumb-path-item" onclick="DiseaseModule.filterDept('神经外科', this)">神经外科</div>
            <div class="breadcrumb-path-item" onclick="DiseaseModule.filterDept('结直肠外科', this)">结直肠外科</div>
            <div class="breadcrumb-path-item" onclick="DiseaseModule.filterDept('骨科', this)">骨科</div>
            <div class="breadcrumb-path-item" onclick="DiseaseModule.filterDept('核医学科', this)">核医学科</div>
            <div class="breadcrumb-path-item" onclick="DiseaseModule.filterDept('泌尿外科', this)">泌尿外科</div>
          </div>

          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-icon blue"><svg viewBox="0 0 20 20" width="20" height="20"><path d="M4 5h2M4 10h2M4 15h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M8 5h8M8 10h8M8 15h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></div>
              <div class="stat-info"><div class="value" id="diseaseTotalCount">19</div><div class="label">病种总数</div></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon blue"><svg viewBox="0 0 20 20" width="20" height="20"><rect x="4" y="3" width="12" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M7 7h6M7 10h6M7 13h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></div>
              <div class="stat-info"><div class="value">256</div><div class="label">专科病历模板总数</div></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon green"><svg viewBox="0 0 20 20" width="20" height="20"><path d="M4 16V8M8 16V5M12 16V10M16 16V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
              <div class="stat-info"><div class="value">189</div><div class="label">专科医学量表总数</div></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon yellow"><svg viewBox="0 0 20 20" width="20" height="20"><rect x="3" y="3" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="3" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="11" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></div>
              <div class="stat-info"><div class="value">5,678</div><div class="label">专科数据元总数</div></div>
            </div>
            <div class="stat-card">
              <div class="stat-icon purple"><svg viewBox="0 0 20 20" width="20" height="20"><circle cx="10" cy="7" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M4 17c0-3.3 2.7-6 6-6s6 2.7 6 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
              <div class="stat-info"><div class="value">12,580</div><div class="label">在管患者</div></div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <h3>病种列表</h3>
              <div class="table-filters">
                <input type="text" placeholder="搜索病种..." id="diseaseSearchInput" oninput="DiseaseModule.filter()" style="width:180px">
                <select id="diseaseStatusFilter" onchange="DiseaseModule.filter()">
                  <option value="all">所有状态</option>
                  <option value="enabled">已启用</option>
                  <option value="disabled">已停用</option>
                </select>
                <button class="btn btn-sm btn-outline" onclick="showModal('disease-modal')">导入</button>
                <button class="btn btn-sm btn-primary" onclick="showModal('disease-modal')">新增病种</button>
                <button class="btn btn-sm btn-success" onclick="DiseaseModule.batchAction('enable')">批量启用</button>
                <button class="btn btn-sm btn-danger" onclick="DiseaseModule.batchAction('disable')">批量停用</button>
              </div>
            </div>
            <div class="card-body">
              <div class="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th><input type="checkbox" id="diseaseSelectAll" onchange="DiseaseModule.toggleSelectAll(this)"></th>
                      <th>序号</th>
                      <th>病种名称</th>
                      <th>病种代码</th>
                      <th>所属学科</th>
                      <th>在管患者</th>
                      <th>病历模板</th>
                      <th>评估量表</th>
                      <th>数据元</th>
                      <th>诊疗路径</th>
                      <th>状态</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="diseaseTableBody">
                  </tbody>
                </table>
              </div>
            </div>
          </div>

<script>
(function() {
  const diseasesData = [
    { name: '脑梗死', code: 'DE-CBI-001', specialty: '神经内科', count: 987, templateCount: 6, scaleCount: 4, elementCount: 138, pathwayCount: 1, status: 'enabled', icon: '脑' },
    { name: '脑出血', code: 'DE-CBH-001', specialty: '神经外科', count: 345, templateCount: 4, scaleCount: 3, elementCount: 115, pathwayCount: 1, status: 'enabled', icon: '脑' },
    { name: '动脉瘤', code: 'DE-ANE-001', specialty: '神经外科', count: 234, templateCount: 3, scaleCount: 2, elementCount: 86, pathwayCount: 0, status: 'enabled', icon: '脑' },
    { name: '结肠癌', code: 'DE-CCA-001', specialty: '结直肠外科', count: 456, templateCount: 5, scaleCount: 3, elementCount: 98, pathwayCount: 1, status: 'enabled', icon: '瘤' },
    { name: '心肌病', code: 'DE-CMY-001', specialty: '心血管内科', count: 345, templateCount: 4, scaleCount: 3, elementCount: 120, pathwayCount: 0, status: 'enabled', icon: '心' },
    { name: '冠心病 / 急性心肌梗死', code: 'DE-AMI-001', specialty: '心血管内科', count: 1256, templateCount: 8, scaleCount: 5, elementCount: 156, pathwayCount: 3, status: 'enabled', icon: '心' },
    { name: '高血压', code: 'DE-HYP-001', specialty: '心血管内科', count: 865, templateCount: 5, scaleCount: 4, elementCount: 92, pathwayCount: 1, status: 'enabled', icon: '心' },
    { name: '心力衰竭', code: 'DE-HF-001', specialty: '心血管内科', count: 567, templateCount: 4, scaleCount: 3, elementCount: 108, pathwayCount: 1, status: 'enabled', icon: '心' },
    { name: '心律失常（房颤）', code: 'DE-AF-001', specialty: '心血管内科', count: 456, templateCount: 3, scaleCount: 2, elementCount: 86, pathwayCount: 0, status: 'enabled', icon: '心' },
    { name: '起搏治疗相关疾病', code: 'DE-PGM-001', specialty: '心血管内科', count: 234, templateCount: 2, scaleCount: 2, elementCount: 72, pathwayCount: 0, status: 'enabled', icon: '心' },
    { name: '心脏瓣膜病', code: 'DE-VHD-001', specialty: '心血管内科', count: 345, templateCount: 3, scaleCount: 2, elementCount: 95, pathwayCount: 1, status: 'enabled', icon: '心' },
    { name: '肺动脉高压', code: 'DE-PAH-001', specialty: '心血管内科', count: 123, templateCount: 2, scaleCount: 1, elementCount: 56, pathwayCount: 0, status: 'enabled', icon: '肺' },
    { name: '先天性心脏病', code: 'DE-CHD-001', specialty: '心血管内科', count: 156, templateCount: 3, scaleCount: 2, elementCount: 78, pathwayCount: 0, status: 'enabled', icon: '心' },
    { name: '髋关节', code: 'DE-HIP-001', specialty: '骨科', count: 345, templateCount: 4, scaleCount: 3, elementCount: 86, pathwayCount: 1, status: 'enabled', icon: '骨' },
    { name: '膝关节', code: 'DE-KNE-001', specialty: '骨科', count: 456, templateCount: 4, scaleCount: 3, elementCount: 90, pathwayCount: 1, status: 'enabled', icon: '骨' },
    { name: '肿瘤术后同位素治疗', code: 'DE-NMT-001', specialty: '核医学科', count: 234, templateCount: 2, scaleCount: 1, elementCount: 45, pathwayCount: 0, status: 'enabled', icon: '核' },
    { name: '肾癌', code: 'DE-RCC-001', specialty: '泌尿外科', count: 123, templateCount: 3, scaleCount: 2, elementCount: 72, pathwayCount: 0, status: 'enabled', icon: '肾' },
    { name: '前列腺癌', code: 'DE-PRC-001', specialty: '泌尿外科', count: 156, templateCount: 3, scaleCount: 2, elementCount: 78, pathwayCount: 0, status: 'enabled', icon: '肾' },
    { name: '尿路上皮癌', code: 'DE-UC-001', specialty: '泌尿外科', count: 98, templateCount: 2, scaleCount: 1, elementCount: 56, pathwayCount: 0, status: 'enabled', icon: '肾' }
  ];

  let currentDeptFilter = 'all';
  let selectedDiseases = new Set();

  window.DiseaseModule = {
    filterDept(dept, el) {
      currentDeptFilter = dept;
      document.querySelectorAll('#diseaseDeptFilter .breadcrumb-path-item').forEach(item => item.classList.remove('active'));
      el.classList.add('active');
      this.render();
    },

    filter() { this.render(); },

    toggleSelectAll(el) {
      const checked = el.checked;
      document.querySelectorAll('.disease-checkbox').forEach(cb => {
        cb.checked = checked;
        if (checked) selectedDiseases.add(cb.value);
        else selectedDiseases.delete(cb.value);
      });
    },

    toggleSelect(name) {
      if (selectedDiseases.has(name)) selectedDiseases.delete(name);
      else selectedDiseases.add(name);
    },

    toggleStatus(name) {
      const d = diseasesData.find(d => d.name === name);
      if (d) {
        d.status = d.status === 'enabled' ? 'disabled' : 'enabled';
        this.render();
      }
    },

    batchAction(action) {
      const checkboxes = document.querySelectorAll('.disease-checkbox:checked');
      if (checkboxes.length === 0) { alert('请先选择要操作的病种'); return; }
      checkboxes.forEach(cb => {
        const d = diseasesData.find(d => d.name === cb.value);
        if (d) d.status = action === 'enable' ? 'enabled' : 'disabled';
      });
      this.render();
      selectedDiseases.clear();
      const all = document.getElementById('diseaseSelectAll');
      if (all) all.checked = false;
    },

    showDetail(name) {
      const d = diseasesData.find(d => d.name === name);
      if (!d) return;
      // Store selected disease for detail module
      window._currentDiseaseDetail = d;
      if (typeof ModuleLoader !== 'undefined') {
        ModuleLoader.load('disease-detail');
      }
    },

    render() {
      const tbody = document.getElementById('diseaseTableBody');
      if (!tbody) return;
      const search = document.getElementById('diseaseSearchInput') ? document.getElementById('diseaseSearchInput').value : '';
      const status = document.getElementById('diseaseStatusFilter') ? document.getElementById('diseaseStatusFilter').value : 'all';

      let filtered = diseasesData.filter(d => {
        const matchDept = currentDeptFilter === 'all' || d.specialty === currentDeptFilter;
        const matchSearch = !search || d.name.includes(search) || d.code.toLowerCase().includes(search.toLowerCase());
        const matchStatus = status === 'all' || d.status === status;
        return matchDept && matchSearch && matchStatus;
      });

      var countEl = document.getElementById('diseaseTotalCount');
      if (countEl) countEl.textContent = filtered.length;

      tbody.innerHTML = filtered.map((d, index) => `
        <tr>
          <td><input type="checkbox" class="disease-checkbox" value="${d.name}" onchange="DiseaseModule.toggleSelect('${d.name}')"></td>
          <td>${index + 1}</td>
          <td><strong style="color:var(--primary);cursor:pointer;text-decoration:underline" onclick="DiseaseModule.showDetail('${d.name}')">${d.name}</strong></td>
          <td style="font-family:monospace;font-size:12px;color:var(--gray-600)">${d.code}</td>
          <td>${d.specialty}</td>
          <td>${d.count}</td>
          <td><span style="color:var(--primary);cursor:pointer;text-decoration:underline">${d.templateCount}</span></td>
          <td><span style="color:var(--primary);cursor:pointer;text-decoration:underline">${d.scaleCount}</span></td>
          <td><span style="color:var(--primary);cursor:pointer;text-decoration:underline">${d.elementCount}</span></td>
          <td><span style="color:var(--primary);cursor:pointer;text-decoration:underline">${d.pathwayCount}</span></td>
          <td>${d.status === 'enabled' ? '<span class="tag tag-success">已启用</span>' : '<span class="tag tag-warning">已停用</span>'}</td>
          <td>
            <button class="btn btn-sm btn-outline" onclick="DiseaseModule.showDetail('${d.name}')">详情</button>
            <button class="btn btn-sm btn-outline" onclick="DiseaseModule.toggleStatus('${d.name}')">${d.status === 'enabled' ? '停用' : '启用'}</button>
          </td>
        </tr>
      `).join('');
    }
  };

  // Auto-render when module loads
  document.addEventListener('module:loaded', function(e) {
    if (e.detail && e.detail.pageId === 'diseases') {
      DiseaseModule.render();
    }
  });

  // Render now if already loaded
  DiseaseModule.render();
})();
</script>
</div>
