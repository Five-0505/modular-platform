  function showListView() {
    currentModule = null;
    document.getElementById('knowledge-module-list').style.display = '';
    document.getElementById('knowledge-detail-view').style.display = 'none';
  }

  function showDetailView(modId, d) {
    var mod = null;
    for (var i = 0; i < knowledgeModules.length; i++) {
      if (knowledgeModules[i].id === modId) { mod = knowledgeModules[i]; break; }
    }
    if (!mod) return;
    currentModule = modId;
    var samples = getKnowledgeSamples(modId, d);

    var html = '';
    html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">';
    html += '<button class="btn btn-sm btn-outline" onclick="document.dispatchEvent(new CustomEvent(\'knowledge:back\'))" style="display:flex;align-items:center;gap:4px">';
    html += '<svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4l-6 6 6 6"/></svg>';
    html += '返回</button>';
    html += '<h3 style="font-size:16px;font-weight:600;color:var(--text-primary)">' + mod.name + '</h3>';
    html += '<span style="font-size:12px;color:var(--text-tertiary)">共 ' + samples.length + ' 条知识</span>';
    html += '</div>';
    html += '<div class="card"><div class="card-header"><h3>' + d.name + ' - ' + mod.name + '</h3>';
    html += '<div class="table-filters"><button class="btn btn-sm btn-outline">批量导出</button><button class="btn btn-sm btn-primary">新增知识</button></div></div>';
    html += '<div class="card-body"><div class="table-wrapper"><table><thead><tr>';
    html += '<th>知识名称</th><th>版本</th><th>状态</th><th>更新时间</th><th>操作</th>';
    html += '</tr></thead><tbody>';
    for (var j = 0; j < samples.length; j++) {
      var s = samples[j];
      var statusClass = s.status === '已发布' ? 'tag-success' : 'tag-warning';
      html += '<tr><td>1</td>
<td><strong>' + s.title + '</strong></td><td>' + s.version + '</td>';
      html += '<td><span class="tag ' + statusClass + '">' + s.status + '</span></td>';
      html += '<td>' + s.updated + '</td>';
      html += '<td><button class="btn btn-sm btn-outline">查看</button> <button class="btn btn-sm btn-outline">编辑</button></td></tr>';
    }
    html += '</tbody></table></div></div></div>';

    var detailView = document.getElementById('knowledge-detail-view');
    detailView.innerHTML = html;
    document.getElementById('knowledge-module-list').style.display = 'none';
    detailView.style.display = '';
  }

  function init() {
    if (typeof DiseaseContext === 'undefined') return;
    var d = DiseaseContext.get();
    var stats = DiseaseContext.getStats();

    // 更新副标题和病种标签
    var subtitleEl = document.getElementById('knowledge-disease-subtitle');
    if (subtitleEl) subtitleEl.textContent = d.dept + ' | 在管患者 ' + d.patientCount.toLocaleString() + ' 人';
    var labelEl = document.getElementById('knowledge-disease-label');
    if (labelEl) labelEl.textContent = '当前病种: ' + d.name;

    // 更新统计卡片
    var vals = document.querySelectorAll('.stat-card .value');
    if (vals.length >= 4) {
      vals[0].textContent = '14';
      vals[1].textContent = Math.floor(d.patientCount * 0.8).toLocaleString();
      vals[2].textContent = Math.floor(d.patientCount * 5.2).toLocaleString();
      vals[3].textContent = (85 + (d.patientCount % 15)) + '%';
    }

    // 生成知识模块列表
    var list = document.getElementById('knowledge-module-list');
    if (!list) return;

    var html = '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">';
    for (var i = 0; i < knowledgeModules.length; i++) {
      var mod = knowledgeModules[i];
      var count = Math.floor(50 + (d.patientCount * (0.08 + i * 0.03)));
      var updated = Math.floor(2 + (d.patientCount + i * 7) % 28);

      html += '<div class="km-card" data-mod="' + mod.id + '" style="display:flex;align-items:center;gap:16px;padding:16px 20px;background:var(--bg-primary,#fff);border:1px solid var(--gray-200,#e2e8f0);border-radius:10px;cursor:pointer;transition:all 0.15s">';
      html += '<div style="width:40px;height:40px;border-radius:8px;background:var(--gray-50,#f8fafc);border:1px solid var(--gray-200,#e2e8f0);display:flex;align-items:center;justify-content:center;flex-shrink:0">';
      html += '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--gray-500,#64748b)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="' + mod.icon + '"/></svg>';
      html += '</div>';
      html += '<div style="flex:1;min-width:0">';
      html += '<div style="font-weight:600;font-size:14px;color:var(--text-primary,#1e293b);margin-bottom:2px">' + mod.name + '</div>';
      html += '<div style="font-size:12px;color:var(--text-tertiary,#94a3b8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + mod.desc + '</div>';
      html += '</div>';
      html += '<div style="text-align:right;flex-shrink:0">';
      html += '<div style="font-size:15px;font-weight:700;color:var(--text-primary,#1e293b)">' + count + '</div>';
      html += '<div style="font-size:11px;color:var(--text-tertiary,#94a3b8)">条知识</div>';
      html += '</div>';
      html += '<svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="var(--gray-400,#94a3b8)" stroke-width="2" style="flex-shrink:0"><path d="M7 4l6 6-6 6"/></svg>';
      html += '</div>';
    }
    html += '</div>';
    list.innerHTML = html;

    // 绑定卡片点击事件
    var cards = list.querySelectorAll('.km-card');
    for (var k = 0; k < cards.length; k++) {
      cards[k].addEventListener('click', function() {
        showDetailView(this.getAttribute('data-mod'), d);
      });
      cards[k].addEventListener('mouseenter', function() {
        this.style.borderColor = 'var(--primary,#3b82f6)';
        this.style.boxShadow = '0 2px 8px rgba(59,130,246,0.08)';
      });
      cards[k].addEventListener('mouseleave', function() {
        this.style.borderColor = 'var(--gray-200,#e2e8f0)';
        this.style.boxShadow = 'none';
      });
    }

    // 如果当前正在查看详情，重新渲染
    if (currentModule) {
      showDetailView(currentModule, d);
    }
  }

  document.addEventListener('knowledge:back', showListView);

  init();
  document.addEventListener('module:loaded', function(e) {
    if (e.detail && e.detail.pageId === 'knowledge/disease') {
      showListView();
      init();
    }
  });
  document.addEventListener('disease:changed', function() {
    setTimeout(init, 50);
  });
})();
</script>
