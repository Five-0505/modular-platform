<script>
(function() {
  function init() {
    if (typeof DiseaseContext === 'undefined') return;
    var d = DiseaseContext.get();
    var titleEl = document.querySelector('.page-header-left h2');
    if (titleEl) titleEl.textContent = 'AI知识图谱';
    var subtitleEl = document.querySelector('.page-header-left p');
    if (subtitleEl) subtitleEl.textContent = d.dept + ' | 在管患者 ' + d.patientCount.toLocaleString() + ' 人';
  }
  init();
  document.addEventListener('module:loaded', function(e) {
    if (e.detail && e.detail.pageId === 'knowledge/graph') init();
  });
})();
</script>
