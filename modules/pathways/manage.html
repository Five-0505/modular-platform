<script>
(function() {
  function initPathwayManage() {
    if (typeof DiseaseContext === 'undefined') return;
    var d = DiseaseContext.get();
    var pathways = DiseaseContext.getPathways();
    var stats = DiseaseContext.getStats();

    var titleEl = document.querySelector('.page-header h2');
    if (titleEl) titleEl.textContent = '诊疗路径管理';
    var subEl = document.querySelector('.page-header p');
    if (subEl) subEl.textContent = d.dept + ' | 管理各专科诊疗路径的版本、节点配置与审批状态';

    var thead = document.querySelector('table thead');
    if (thead) {
      thead.innerHTML = '<tr>' +
        '<th>路径名称</th>' +
        '<th>节点数</th>' +
        '<th>符合率</th>' +
        '<th>更新时间</th>' +
        '<th>状态</th>' +
        '<th>操作</th>' +
      '</tr>';
    }

    var tbody = document.querySelector('table tbody');
    if (tbody && pathways) {
      tbody.innerHTML = pathways.map(function(p) {
        return '<tr><td><strong>' + p.name + '</strong></td>' +
          '<td>' + p.nodes + '</td>' +
          '<td><div class="progress-bar" style="width:120px"><div class="fill" style="width:' + p.compliance + '%"></div></div> ' + p.compliance + '%</td>' +
          '<td>' + p.updated + '</td>' +
          '<td><span class="tag tag-success">' + p.status + '</span></td>' +
          '<td><button class="btn btn-sm btn-outline">详情</button></td></tr>';
      }).join('');
    }
  }

  initPathwayManage();
  document.addEventListener('module:loaded', function(e) {
    if (e.detail && e.detail.pageId === 'pathways/manage') initPathwayManage();
  });
})();
</script>
